# Derived from:
## docker run --rm --name scoreboard -itdv ${PWD}:/crg-container -p 8000:8000 openjdk
## docker exec -it scoreboard /bin/bash
## cd /crg-container/crg-scoreboard_v2023.5
## ./scoreboard.sh

---
services:
  # CRG container application definition
  scoreboard:
    # Specify build parameters
    build:
      # Set build arguments from environment variables file
      args:
        - CRG_SOURCE_DIR=${CRG_SOURCE_DIR}
        - CRG_SOURCE_VOLUME=${CRG_SOURCE_VOLUME}
        - CRG_MOUNT_DIR=${CRG_MOUNT_DIR}
      # Set path to Dockerfile and Dockerfile name
      context: ./
      dockerfile: Dockerfile-scoreboard
    # Command to comment the 'GUI' line in scoreboard.sh and start CRG
    command: >
        /bin/bash -c "sed -i -e 's/^GUI/#\ GUI/' ./scoreboard.sh
        && ./scoreboard.sh"
    # Set a container restart policy to recover from a container failure
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    # Read environment variables from a .env file
    env_file:
      - path: .env
        required: true
    # Check the status of the web application
    ## curl -fIs http://scoreboard:8000
    ## Monitor results with the following command
    ## docker inspect -f "{{ json .State.Health }}" $(docker ps -lq)
    ## A response of "HTTP/1.1 200" is a successful health check
    healthcheck:
      test: ["CMD", "curl", "-fIs", "http://scoreboard:8000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Publish host TCP port 8000
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: host
    # Mount the local CRG volume
    volumes:
      - type: bind
        source: ${CRG_SOURCE_VOLUME}/${CRG_SOURCE_DIR}
        target: /${CRG_MOUNT_DIR}
  # CRG container application definition
  jamstats:
    # Specify build parameters
    build:
      # Set build arguments from environment variables file
      args:
        - CRG_SOURCE_DIR=${CRG_SOURCE_DIR}
        - CRG_SOURCE_VOLUME=${CRG_SOURCE_VOLUME}
        - CRG_MOUNT_DIR=${CRG_MOUNT_DIR}
      # Set path to Dockerfile and Dockerfile name
      context: ./
      dockerfile: Dockerfile-jamstats
    # Command to comment the 'GUI' line in scoreboard.sh and start CRG
    command: >
        jamstats --scoreboardserver scoreboard:8000 --jamstatsport 8080 --jamstatsip jamstats --theme darkgrid
    # command: >
    #     /bin/bash -c "echo 'Hello World'; sleep infinity"
    # Set dependant services
    depends_on:
      - scoreboard
    # Set a container restart policy to recover from a container failure
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    # Check the status of the web application
    ## curl -fIs http://jamstats:8080
    ## Monitor results with the following command
    ## docker inspect -f "{{ json .State.Health }}" $(docker ps -lq)
    ## A response of "HTTP/1.1 200" is a successful health check
    healthcheck:
      test: ["CMD", "curl", "-fIs", "http://jamstats:8080"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    # Publish host TCP port 8080
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    # Mount the local CRG volume
    volumes:
      - type: bind
        source: ${CRG_SOURCE_VOLUME}/${CRG_SOURCE_DIR}
        target: /${CRG_MOUNT_DIR}
